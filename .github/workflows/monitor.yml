name: GPU Stock Monitor

on:
  # Run every 15 minutes
  schedule:
    - cron: "*/15 * * * *"

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      command:
        description: "CLI command to run"
        required: false
        default: "check-once"
        type: choice
        options:
          - check-once
          - send-test-alert
          - ensure-discord-channel
          - list-products

env:
  PYTHON_VERSION: "3.12"
  # Override Discord token and guild from GitHub secrets (do NOT put secrets in config.yaml)
  GPU_MONITOR_CONFIG: config/config.yaml

jobs:
  monitor:
    name: Check GPU Stock
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          playwright install chromium --with-deps

      - name: Restore SQLite state
        uses: actions/cache@v4
        with:
          path: data/gpu_monitor.db
          key: gpu-db-${{ github.run_id }}
          restore-keys: |
            gpu-db-

      - name: Create required directories
        run: mkdir -p data logs/screenshots

      - name: Override Discord token from secret
        run: |
          python - <<'EOF'
          import yaml, os
          path = "config/config.yaml"
          with open(path) as f:
              cfg = yaml.safe_load(f)
          token = os.environ.get("DISCORD_BOT_TOKEN")
          guild = os.environ.get("DISCORD_GUILD_ID")
          if token:
              cfg["discord"]["token"] = token
          if guild:
              cfg["discord"]["guild_id"] = guild
          with open(path, "w") as f:
              yaml.dump(cfg, f, default_flow_style=False, allow_unicode=True)
          EOF
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}

      - name: Run GPU Monitor
        run: |
          COMMAND="${{ github.event.inputs.command || 'check-once' }}"
          gpu-monitor "$COMMAND"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-monitor-logs-${{ github.run_id }}
          path: |
            logs/
          retention-days: 7

      - name: Save SQLite state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/gpu_monitor.db
          key: gpu-db-${{ github.run_id }}

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    # Only run tests on pushes, not on schedule
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short --ignore=tests/test_parsers.py -k "not fixture"
        # Fixture-based parser tests need live HTML — run them separately or skip in CI
