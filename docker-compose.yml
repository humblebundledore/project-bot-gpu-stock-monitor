version: "3.9"

services:
  gpu-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpu-stock-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GPU_MONITOR_CONFIG: /app/config/config.yaml
      PYTHONUNBUFFERED: "1"
    volumes:
      # Persist DB and logs outside the container
      - ./data:/app/data:z
      - ./logs:/app/logs:z
    command: run-daemon
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/gpu_monitor.db').close()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Optional: one-shot check (useful for cron / testing)
  gpu-monitor-check:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - check
    env_file:
      - .env
    environment:
      GPU_MONITOR_CONFIG: /app/config/config.yaml
    volumes:
      - ./data:/app/data:z
      - ./logs:/app/logs:z
    command: check-once
    restart: "no"
